events { worker_connections 1024; }
http {
    upstream backend { server backend:8000; }
    upstream ai_service { server ai_service:8001; }
    server {
        listen 80;
        server_name api.shiguangliuying.com;
        client_max_body_size 50M;
        location /api/v1/ { proxy_pass http://backend; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_read_timeout 120s; }
        location /ai/ { proxy_pass http://ai_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 300s; }
        location /static/ { root /var/www; expires 30d; }
    }
}
