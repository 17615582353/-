version: "3.8"
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - DATABASE_URL=mysql+aiomysql://root:password@mysql/shiguang
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai_service:8001
    depends_on: { mysql: { condition: service_healthy }, redis: { condition: service_started } }
    restart: unless-stopped
    volumes: [uploads:/app/uploads]
  ai_service:
    build: ./ai_service
    ports: ["8001:8001"]
    environment: [DEVICE=cpu]
    restart: unless-stopped
    volumes: [ai_models:/app/models, ai_temp:/tmp]
  mysql:
    image: mysql:8.0
    environment: { MYSQL_ROOT_PASSWORD: password, MYSQL_DATABASE: shiguang }
    ports: ["3306:3306"]
    healthcheck: { test: ["CMD", "mysqladmin", "ping", "-h", "localhost"], timeout: 20s, retries: 10 }
    volumes: [mysql_data:/var/lib/mysql]
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    ports: ["80:80","443:443"]
    volumes: [./nginx.conf:/etc/nginx/nginx.conf:ro]
    depends_on: [backend]
    restart: unless-stopped
volumes: { mysql_data:, redis_data:, uploads:, ai_models:, ai_temp: }
